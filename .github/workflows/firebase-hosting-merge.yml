# Deploy Hosting + Cloud Functions (Node.js gen1) + Firestore rules on push to main
name: Deploy to Firebase on merge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install function dependencies
        run: npm --prefix functions install

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AI_ENGLISH_CONVERSATION_C695C }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions,firestore:rules --project ai-english-conversation-c695c
