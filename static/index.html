<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI English Voice Coach</title>

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(160deg, #1e1b4b 0%, #312e81 45%, #1a3a5c 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* ── Header ───────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hdr-icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .hdr-title { font-size: 16px; font-weight: 700; }
    .hdr-sub   { font-size: 11px; opacity: .55; margin-top: 1px; }
    .hdr-right { margin-left: auto; display: flex; gap: 8px; }

    .pill-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 12px; color: #fff;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .pill-btn:hover { background: rgba(255,255,255,.22); }
    .pill-btn.on { background: rgba(99,102,241,.55); border-color: #818cf8; }
    .pill-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
      transition: background .15s;
    }
    .pill-btn.on .pill-dot { background: #c7d2fe; }

    /* ── Voice selector bar ───────────────────────────────────── */
    #voiceBar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 18px 8px;
    }
    #voiceBar label { font-size: 12px; opacity: .6; white-space: nowrap; }
    #voiceSelect {
      flex: 1; max-width: 420px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px; color: #fff;
      outline: none; cursor: pointer;
    }
    #voiceSelect option { background: #312e81; color: #fff; }

    /* ── Tab Navigation ───────────────────────────────────────── */
    #tabNav {
      flex-shrink: 0;
      display: flex;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,.45);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn:hover { color: rgba(255,255,255,.8); }
    .tab-btn.active { color: #fff; border-bottom-color: #818cf8; }

    /* ── Conversation Panel ───────────────────────────────────── */
    #convPanel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Corrections panel */
    #correctionsArea {
      flex-shrink: 0;
      max-height: 200px;
      overflow-y: auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #correctionsArea:empty { display: none; }
    .c-card {
      background: rgba(255,255,255,.95);
      border: 1px solid #fbbf24;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px; line-height: 1.55;
      color: #1f2937;
      display: flex; flex-direction: column; gap: 6px;
      animation: fadeSlide .3s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .c-head { display: flex; justify-content: space-between; align-items: center; }
    .c-title { font-size: 12px; font-weight: 700; color: #b45309; display: flex; align-items: center; gap: 4px; }
    .c-num   { font-size: 11px; color: #9ca3af; }
    .c-row   { display: flex; flex-direction: column; gap: 1px; }
    .c-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #9ca3af; }
    .c-row.orig .c-val  { color: #ef4444; text-decoration: line-through; }
    .c-row.corr .c-val  { color: #059669; font-weight: 600; }
    .c-row.why  .c-val  { color: #6b7280; font-style: italic; }

    /* Voice center */
    #voiceArea {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 16px;
    }
    #userSaid { max-width: 520px; width: 100%; text-align: right; }
    #userSaid:empty { display: none; }
    .user-bubble {
      display: inline-block;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 18px 18px 4px 18px;
      padding: 10px 16px;
      font-size: 16px; line-height: 1.5;
      color: rgba(255,255,255,.95);
      max-width: 100%; word-break: break-word; text-align: left;
    }
    .user-label { font-size: 11px; opacity: .5; margin-bottom: 4px; letter-spacing: .3px; }

    #aiSubtitle {
      max-width: 520px; width: 100%;
      min-height: 64px; text-align: center;
      font-size: 18px; line-height: 1.6;
      color: rgba(255,255,255,.92);
      background: rgba(255,255,255,.09);
      border-radius: 18px; padding: 14px 22px;
      transition: opacity .3s;
    }
    #aiSubtitle:empty   { display: none; }
    #aiSubtitle.loading { display: flex; align-items: center; justify-content: center; gap: 7px; }

    .tdot {
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(255,255,255,.5);
      animation: tdot .9s ease-in-out infinite;
    }
    .tdot:nth-child(2) { animation-delay: .15s; }
    .tdot:nth-child(3) { animation-delay: .30s; }
    @keyframes tdot {
      0%,80%,100% { transform: scale(.7); opacity: .4; }
      40%         { transform: scale(1.3); opacity: 1; }
    }

    .mic-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .ring {
      position: absolute; border-radius: 50%;
      pointer-events: none; border: 2.5px solid transparent;
    }
    [data-state="recording"] .ring-a { width:116px; height:116px; border-color:rgba(239,68,68,.55); animation:ring-out 1.4s ease-out infinite; }
    [data-state="recording"] .ring-b { width:148px; height:148px; border-color:rgba(239,68,68,.3);  animation:ring-out 1.4s ease-out infinite .5s; }
    [data-state="speaking"]  .ring-a { width:116px; height:116px; border-color:rgba(129,140,248,.6); animation:ring-out 1.8s ease-out infinite; }
    [data-state="speaking"]  .ring-b { width:152px; height:152px; border-color:rgba(129,140,248,.3); animation:ring-out 1.8s ease-out infinite .6s; }
    @keyframes ring-out { 0% { transform:scale(.75); opacity:1; } 100% { transform:scale(1.45); opacity:0; } }

    #micBtn {
      width:92px; height:92px; border-radius:50%; border:none;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      position:relative; z-index:1; transition:background .3s, box-shadow .3s;
    }
    #micBtn:disabled { opacity:.45; cursor:not-allowed; }
    #micBtn:not(:disabled):active { transform:scale(.91); }
    #micBtn svg { width:38px; height:38px; transition:fill .25s; }

    [data-state="idle"]       #micBtn { background:#fff; box-shadow:0 6px 28px rgba(0,0,0,.35); animation:breathe 3s ease-in-out infinite; }
    [data-state="idle"]       #micBtn svg { fill:#312e81; }
    [data-state="recording"]  #micBtn { background:#ef4444; box-shadow:0 6px 24px rgba(239,68,68,.5); }
    [data-state="recording"]  #micBtn svg { fill:#fff; }
    [data-state="processing"] #micBtn { background:rgba(99,102,241,.7); box-shadow:0 6px 24px rgba(99,102,241,.5); animation:thinking-pulse 1.2s ease-in-out infinite; }
    [data-state="processing"] #micBtn svg { fill:#fff; }
    [data-state="speaking"]   #micBtn { background:linear-gradient(135deg,#4f46e5,#3b82f6); box-shadow:0 6px 28px rgba(79,70,229,.6); }
    [data-state="speaking"]   #micBtn svg { fill:#fff; }
    @keyframes breathe { 0%,100% { transform:scale(1);    box-shadow:0 6px 28px rgba(0,0,0,.35); } 50% { transform:scale(1.05); box-shadow:0 6px 36px rgba(99,102,241,.45); } }
    @keyframes thinking-pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }

    #cancelBtn {
      display:none; background:rgba(239,68,68,.2);
      border:1px solid rgba(239,68,68,.5); border-radius:20px;
      padding:6px 18px; font-size:13px; color:#fca5a5;
      cursor:pointer; transition:background .15s;
    }
    #cancelBtn:hover { background:rgba(239,68,68,.35); }
    [data-state="recording"] #cancelBtn { display:block; }

    #statusText {
      font-size:14px; opacity:.65; text-align:center;
      letter-spacing:.2px; min-height:22px; max-width:360px; line-height:1.4;
    }

    /* Bottom bar */
    #bottomBar {
      flex-shrink:0; padding:10px 16px 20px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
    }
    .action-row { display:flex; gap:10px; }
    #textPanel { display:none; width:100%; max-width:580px; gap:8px; align-items:flex-end; }
    #textPanel.open { display:flex; }
    #textInput {
      flex:1; background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.3); border-radius:12px;
      padding:10px 14px; font-size:15px; font-family:inherit;
      color:#fff; resize:none; outline:none;
      max-height:100px; line-height:1.5; transition:border-color .15s;
    }
    #textInput::placeholder { color:rgba(255,255,255,.35); }
    #textInput:focus { border-color:rgba(255,255,255,.55); }
    #textSendBtn {
      width:42px; height:42px; border-radius:12px; border:none;
      background:#6366f1; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s;
    }
    #textSendBtn:hover { background:#4f46e5; }
    #textSendBtn svg { width:20px; height:20px; fill:#fff; }
    #noVoiceBanner {
      display:none; background:rgba(251,191,36,.12);
      border:1px solid rgba(251,191,36,.4); border-radius:8px;
      padding:7px 14px; font-size:12px; color:#fde68a; text-align:center;
    }

    /* ── Practice Panel ───────────────────────────────────────── */
    #practicePanel {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 16px 16px 24px;
      overflow-y: auto;
    }

    .mode-toggle {
      display: flex;
      background: rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 3px;
      gap: 2px;
    }
    .mode-btn {
      padding: 7px 22px;
      border: none; border-radius: 21px;
      background: transparent;
      color: rgba(255,255,255,.5);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .mode-btn.active { background: rgba(255,255,255,.2); color: #fff; font-weight: 600; }

    #sentenceCard {
      max-width: 580px; width: 100%;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 18px;
      padding: 22px 26px;
      text-align: center;
    }
    #sentenceDisplay {
      font-size: 20px; line-height: 1.65;
      color: #fff; margin-bottom: 8px; min-height: 30px;
    }
    #sentenceMeta { font-size: 11px; opacity: .45; letter-spacing: .3px; }

    #speedControl {
      display: none; align-items: center; gap: 10px; font-size: 13px;
    }
    #speedSlider { width: 110px; accent-color: #818cf8; cursor: pointer; }
    #speedVal { min-width: 32px; opacity: .8; }

    #practiceBtn {
      padding: 13px 36px; border-radius: 30px; border: none;
      background: #6366f1; color: #fff;
      font-size: 16px; font-weight: 600;
      cursor: pointer; min-width: 210px;
      transition: background .2s, transform .12s;
      box-shadow: 0 4px 20px rgba(99,102,241,.4);
    }
    #practiceBtn:hover { background: #4f46e5; }
    #practiceBtn:active { transform: scale(.95); }
    #practiceBtn[data-pstate="recording"] { background: #ef4444; box-shadow: 0 4px 20px rgba(239,68,68,.4); }
    #practiceBtn[data-pstate="shadowing"] { background: #059669; box-shadow: 0 4px 20px rgba(5,150,105,.4); }
    #practiceBtn:disabled { opacity: .5; cursor: not-allowed; }

    .p-nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .nav-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 16px; color: #fff;
      font-size: 13px; cursor: pointer;
      transition: background .15s;
    }
    .nav-btn:hover { background: rgba(255,255,255,.2); }

    #resultArea {
      max-width: 580px; width: 100%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 16px; padding: 16px 20px;
      display: none; flex-direction: column; gap: 10px;
    }
    #resultArea.show { display: flex; }
    .result-label { font-size: 11px; opacity: .45; text-transform: uppercase; letter-spacing: .5px; }
    #resultText { font-size: 18px; line-height: 1.8; word-break: break-word; }
    .w-ok  { color: rgba(255,255,255,.95); }
    .w-err { color: #f87171; text-decoration: underline wavy rgba(248,113,113,.55); }
    #scoreText { font-size: 14px; font-weight: 600; }

    /* ── Library Section ──────────────────────────────────────── */
    #librarySection {
      max-width: 580px; width: 100%;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 18px; overflow: hidden;
    }
    .lib-header { display: flex; border-bottom: 1px solid rgba(255,255,255,.1); }
    .lib-tab {
      flex: 1; padding: 10px 0; border: none;
      background: transparent;
      color: rgba(255,255,255,.45);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, background .15s;
    }
    .lib-tab.active { color: #fff; border-bottom-color: #818cf8; background: rgba(255,255,255,.05); }
    .lib-panel { display: none; max-height: 260px; overflow-y: auto; }
    .lib-panel.active { display: block; }

    .sent-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 9px 12px; cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .sent-item:last-child { border-bottom: none; }
    .sent-item:hover { background: rgba(255,255,255,.07); }
    .sent-item.active-sent { background: rgba(99,102,241,.2); }
    .sent-text { flex: 1; font-size: 13px; line-height: 1.5; opacity: .9; }
    .sent-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 8px;
      flex-shrink: 0; margin-top: 2px; white-space: nowrap;
    }
    .badge-easy   { background: rgba(74,222,128,.2);  color: #4ade80; }
    .badge-medium { background: rgba(251,191,36,.2);  color: #fbbf24; }
    .badge-hard   { background: rgba(248,113,113,.2); color: #f87171; }
    .badge-ai     { background: rgba(167,139,250,.2); color: #c4b5fd; }
    .badge-saved  { background: rgba(129,140,248,.2); color: #a5b4fc; }
    .sent-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .sact {
      padding: 3px 8px; border-radius: 7px; border: none;
      font-size: 11px; cursor: pointer; transition: background .15s;
    }
    .sact-use  { background: rgba(99,102,241,.35); color: #c7d2fe; }
    .sact-use:hover  { background: rgba(99,102,241,.6); }
    .sact-save { background: rgba(74,222,128,.2);  color: #86efac; }
    .sact-save:hover { background: rgba(74,222,128,.4); }
    .sact-del  { background: rgba(239,68,68,.2);   color: #fca5a5; }
    .sact-del:hover  { background: rgba(239,68,68,.4); }

    /* AI Generate panel */
    .gen-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .gen-row  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .gen-label { font-size: 12px; opacity: .6; width: 56px; flex-shrink: 0; }
    .gen-input {
      flex: 1; background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      padding: 7px 10px; font-size: 13px; color: #fff; outline: none;
    }
    .gen-input::placeholder { color: rgba(255,255,255,.3); }
    .gen-select {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.25); border-radius: 8px;
      padding: 7px 10px; font-size: 13px; color: #fff; outline: none; cursor: pointer;
    }
    .gen-select option { background: #312e81; }
    #genBtn {
      width: 100%; padding: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    #genBtn:disabled { opacity: .5; cursor: not-allowed; }
    #genResults { display: flex; flex-direction: column; gap: 1px; }
    .lib-empty { padding: 20px; text-align: center; font-size: 13px; opacity: .4; }

    /* scrollbars */
    #correctionsArea::-webkit-scrollbar,
    #practicePanel::-webkit-scrollbar,
    .lib-panel::-webkit-scrollbar { width: 4px; }
    #correctionsArea::-webkit-scrollbar-track,
    #practicePanel::-webkit-scrollbar-track,
    .lib-panel::-webkit-scrollbar-track { background: transparent; }
    #correctionsArea::-webkit-scrollbar-thumb,
    #practicePanel::-webkit-scrollbar-thumb,
    .lib-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 4px; }
  </style>
</head>
<body data-state="idle">

<!-- ── Header ── -->
<header>
  <div class="hdr-icon">🎤</div>
  <div>
    <div class="hdr-title">AI English Voice Coach</div>
    <div class="hdr-sub">Speak freely — corrections shown as text</div>
  </div>
  <div class="hdr-right">
    <button class="pill-btn" id="autoBtn"><span class="pill-dot"></span> Auto-listen</button>
    <button class="pill-btn" id="clearBtn">🗑 Clear</button>
  </div>
</header>

<!-- ── Voice selector bar ── -->
<div id="voiceBar">
  <label for="voiceSelect">🔊 Voice</label>
  <select id="voiceSelect"><option value="">Loading voices…</option></select>
</div>

<!-- ── Tab Navigation ── -->
<div id="tabNav">
  <button class="tab-btn active" id="tabConv"     onclick="switchTab('conv')">💬 Conversation</button>
  <button class="tab-btn"        id="tabPractice" onclick="switchTab('practice')">🎯 Speaking Practice</button>
</div>

<!-- ══════════════════════════════════════════════════════════════ -->
<!-- ── Conversation Panel ── -->
<div id="convPanel">

  <!-- Corrections scroll area -->
  <div id="correctionsArea"></div>

  <!-- Voice center -->
  <div id="voiceArea">
    <div id="userSaid"></div>
    <div id="aiSubtitle"></div>

    <div class="mic-wrap">
      <div class="ring ring-a"></div>
      <div class="ring ring-b"></div>
      <button id="micBtn" title="Tap to speak">
        <svg viewBox="0 0 24 24">
          <path d="M12 1c-1.66 0-3 1.34-3 3v8c0 1.66 1.34 3 3 3s3-1.34
                   3-3V4c0-1.66-1.34-3-3-3zm5.91 9c-.49 3.39-3.4 6-6.91
                   6s-6.42-2.61-6.91-6H2.08C2.56 13.88 5.53 17.1 9.5
                   17.82V21H7v2h10v-2h-2.5v-3.18C18.47 17.1 21.44
                   13.88 21.92 10h-2.01z"/>
        </svg>
      </button>
    </div>

    <p id="statusText">Tap to speak in English</p>
    <button id="cancelBtn" title="Cancel recording">✕ Cancel</button>
  </div>

  <!-- Bottom bar -->
  <div id="bottomBar">
    <div id="noVoiceBanner">
      ⚠️ Voice input not supported. Please use Chrome or Edge for microphone access.
    </div>
    <div class="action-row">
      <button class="pill-btn" id="textToggle">⌨️ Type instead</button>
    </div>
    <div id="textPanel">
      <textarea id="textInput" rows="1" placeholder="Type your English message…"></textarea>
      <button id="textSendBtn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div><!-- /convPanel -->

<!-- ══════════════════════════════════════════════════════════════ -->
<!-- ── Practice Panel ── -->
<div id="practicePanel">

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeRead"   onclick="setMode('read')">📖 Read Practice</button>
    <button class="mode-btn"        id="modeShadow" onclick="setMode('shadow')">👥 Shadowing</button>
  </div>

  <!-- Sentence card -->
  <div id="sentenceCard">
    <div id="sentenceDisplay">Loading…</div>
    <div id="sentenceMeta"></div>
  </div>

  <!-- Speed control (shadowing only) -->
  <div id="speedControl">
    <span>Speed:</span>
    <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.1" value="1.0">
    <span id="speedVal">1.0x</span>
  </div>

  <!-- Practice button -->

let history    = [];
let busy       = false;
let autoListen = false;
let corrCount  = 0;
let isRecording = false;
let cancelFlag  = false;
let userTranscript  = '';
let accumulatedFinal = '';

const body            = document.body;
const micBtn          = document.getElementById('micBtn');
const statusText      = document.getElementById('statusText');
const aiSubtitle      = document.getElementById('aiSubtitle');
const correctionsArea = document.getElementById('correctionsArea');
const autoBtn         = document.getElementById('autoBtn');
const clearBtn        = document.getElementById('clearBtn');
const textToggle      = document.getElementById('textToggle');
const textPanel       = document.getElementById('textPanel');
const textInput       = document.getElementById('textInput');
const textSendBtn     = document.getElementById('textSendBtn');
const noVoiceBanner   = document.getElementById('noVoiceBanner');
const userSaid        = document.getElementById('userSaid');

const STATUS = {
  idle:       'Tap the mic to speak in English',
  recording:  'Listening… tap to stop',
  processing: 'Processing…',
  speaking:   'AI is speaking…',
};
function setState(s) {
  body.setAttribute('data-state', s);

}

// ── STT (conversation) ──────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SR) {
  recognition = new SR();
  recognition.lang           = 'en-US';
  recognition.continuous     = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true; userTranscript = ''; accumulatedFinal = '';
    setState('recording'); stopTTS();
  };
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) accumulatedFinal += t + ' ';
      else interim += t;
    }
    userTranscript = (accumulatedFinal + interim).trim();
    if (userTranscript) statusText.textContent = '\u201c' + userTranscript + '\u201d';
  };
  recognition.onend = () => {
    isRecording = false;
    if (cancelFlag) {
      cancelFlag = false; accumulatedFinal = ''; userTranscript = '';
      setState('idle'); return;
    }
    if (userTranscript.trim()) { handleSend(userTranscript.trim()); userTranscript = ''; }
    else setState('idle');
  };
  recognition.onerror = (e) => {
    isRecording = false;
    if (e.error !== 'no-speech' && e.error !== 'aborted') toast('Mic error: ' + e.error);
    setState('idle');
  };
} else {
  micBtn.disabled = true;
  noVoiceBanner.style.display = 'block';
}

document.getElementById('cancelBtn').addEventListener('click', () => {
  if (!isRecording) return;

micBtn.addEventListener('click', () => {

});

// ── TTS ─────────────────────────────────────────────────────────
let voices = [];
const voiceSelect = document.getElementById('voiceSelect');

function populateVoices() {
  voices = window.speechSynthesis.getVoices();
  const english = voices.filter(v => v.lang.startsWith('en'));
  if (!english.length) return;
  voiceSelect.innerHTML = '';
  const sorted = [...english].sort((a, b) => {
    const score = v => /(natural|online)/i.test(v.name) ? 0 : /google/i.test(v.name) ? 1 : /microsoft/i.test(v.name) ? 2 : 3;
    return score(a) - score(b);
  });
  sorted.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = v.name + (v.lang !== 'en-US' ? '  [' + v.lang + ']' : '');
    if (i === 0) opt.selected = true;
    voiceSelect.appendChild(opt);
  });
}
window.speechSynthesis.onvoiceschanged = populateVoices;
populateVoices();

function pickVoice() {
  const all = voices.length ? voices : window.speechSynthesis.getVoices();
  const chosen = voiceSelect.value;
  if (chosen) { const f = all.find(v => v.name === chosen); if (f) return f; }
  return all.find(v => v.lang === 'en-US' && /(natural|online)/i.test(v.name))
      || all.find(v => v.lang === 'en-US' && /google/i.test(v.name))
      || all.find(v => v.lang === 'en-US' && /microsoft/i.test(v.name))
      || all.find(v => v.lang === 'en-US')
      || all.find(v => v.lang.startsWith('en'))
      || null;
}

function speakText(text, onDone) {
  if (!window.speechSynthesis || !text) { onDone?.(); return; }
  stopTTS();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US'; utt.rate = 0.92; utt.pitch = 1.0;
  const voice = pickVoice(); if (voice) utt.voice = voice;
  utt.onend = () => onDone?.(); utt.onerror = () => onDone?.();
  window.speechSynthesis.speak(utt);
}
function stopTTS() { window.speechSynthesis?.cancel(); }

autoBtn.addEventListener('click', () => {

// ── Main send flow ───────────────────────────────────────────────
async function handleSend(message) {
  if (!message?.trim() || busy) return;
  busy = true; micBtn.disabled = true; setState('processing');
  userSaid.innerHTML = `<div class="user-label">🙂 You</div><div class="user-bubble">${esc(message.trim())}</div>`;
  aiSubtitle.innerHTML = '<span class="tdot"></span><span class="tdot"></span><span class="tdot"></span>';
  aiSubtitle.classList.add('loading');
  let fullText = '';
  try {
    const res = await fetch(API_BASE + '/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message.trim(), history }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader(); const decoder = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const p = JSON.parse(line.slice(6));
        if (p.error) { toast('Error: ' + p.error); return; }
        if (p.done) { history.push({ role: 'user', content: message }); history.push({ role: 'assistant', content: fullText }); renderFinal(fullText); return; }
        if (p.text) fullText += p.text;
      }
    }
  } catch (err) {
    console.error(err); toast('Connection error. Please try again.');
    aiSubtitle.innerHTML = ''; aiSubtitle.classList.remove('loading'); setState('idle');
  } finally {
    busy = false; if (recognition) micBtn.disabled = false;
  }
}

function renderFinal(rawText) {
  const corrRe = /---CORRECTION---([\s\S]*?)---END CORRECTION---/;
  const match  = rawText.match(corrRe);
  if (match) addCorrectionCard(match[1].trim());
  const convText = (match ? rawText.replace(corrRe, '') : rawText).trim();
  aiSubtitle.classList.remove('loading');
  aiSubtitle.textContent = convText;
  setState('speaking');
  speakText(convText, () => {
    setState('idle');
    if (autoListen && recognition && !busy) setTimeout(() => { if (!isRecording) recognition.start(); }, 500);
  });
}

function addCorrectionCard(text) {
  corrCount++;
  let original = '', corrected = '', explanation = '';
  for (const line of text.split('\n').map(l => l.trim()).filter(Boolean)) {
    const low = line.toLowerCase();
    if      (low.startsWith('original:'))    original    = line.slice(9).trim();
    else if (low.startsWith('corrected:'))   corrected   = line.slice(10).trim();
    else if (low.startsWith('explanation:')) explanation = line.slice(12).trim();
  }
  const card = document.createElement('div');
  card.className = 'c-card';
  card.innerHTML = `
    <div class="c-head">
      <span class="c-title">✏️ Correction</span>
      <span class="c-num">#${corrCount}</span>
    </div>
    ${original    ? `<div class="c-row orig"><span class="c-label">You said</span><span class="c-val">${esc(original)}</span></div>`    : ''}
    ${corrected   ? `<div class="c-row corr"><span class="c-label">Correct</span><span class="c-val">${esc(corrected)}</span></div>`   : ''}
    ${explanation ? `<div class="c-row why"><span class="c-label">Why</span><span class="c-val">${esc(explanation)}</span></div>`      : ''}
  `;
  correctionsArea.appendChild(card);
  correctionsArea.scrollTop = correctionsArea.scrollHeight;
}

textToggle.addEventListener('click', () => {
  textPanel.classList.toggle('open');
  if (textPanel.classList.contains('open')) textInput.focus();

textInput.addEventListener('input', () => {

textInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } });

function sendText() {
  const msg = textInput.value.trim(); if (!msg || busy) return;
  textInput.value = ''; textInput.style.height = 'auto'; handleSend(msg);
}

clearBtn.addEventListener('click', () => {

// ── Practice STT init ────────────────────────────────────────────
function ensurePracticeRec() {
  if (pRec) return true;
  if (!SR) { toast('Voice input not supported in this browser.'); return false; }
  pRec = new SR();
  pRec.lang = 'en-US'; pRec.continuous = true; pRec.interimResults = true;

  pRec.onstart = () => { pAccFinal = ''; pTranscript = ''; };
  pRec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) pAccFinal += t + ' ';
      else interim += t;
    }
    pTranscript = (pAccFinal + interim).trim();
  };
  pRec.onend = () => {
    clearTimeout(shadowTimer);
    if (pState === 'recording' || pState === 'shadowing') {
      showPracticeResult(activeSent.text, pTranscript);
    }
  };
  pRec.onerror = (e) => {
    clearTimeout(shadowTimer);
    if (e.error !== 'aborted') toast('Mic error: ' + e.error);
    pState = 'idle'; updatePracticeBtn();
  };
  return true;
}

function handleReadMode() {
  if (pState === 'idle' || pState === 'result') {
    if (!ensurePracticeRec()) return;
    pState = 'recording'; updatePracticeBtn();
    document.getElementById('resultArea').classList.remove('show');
    try { pRec.start(); } catch(e) { pRec = null; ensurePracticeRec(); pRec.start(); }
  } else if (pState === 'recording') {
    pRec.stop();

}

// ── Shadow mode ──────────────────────────────────────────────────

  if (pState === 'idle' || pState === 'result') {
    if (!ensurePracticeRec()) return;
    const speed = parseFloat(document.getElementById('speedSlider').value);
    pState = 'shadowing'; updatePracticeBtn();
    document.getElementById('resultArea').classList.remove('show');

    // Start STT
    try { pRec.start(); } catch(e) { pRec = null; ensurePracticeRec(); pRec.start(); }

    // Start TTS
    const utt = new SpeechSynthesisUtterance(activeSent.text);
    utt.lang = 'en-US'; utt.rate = speed;
    const voice = pickVoice(); if (voice) utt.voice = voice;

      shadowTimer = setTimeout(() => {
        if (pState === 'shadowing') try { pRec.stop(); } catch(e) {}
      }, 1500);

  } else if (pState === 'shadowing') {
    clearTimeout(shadowTimer);
    stopTTS();
    try { pRec.stop(); } catch(e) {}
  }
}

  clearTimeout(shadowTimer);

}

// ── Word comparison (LCS-based) ──────────────────────────────────
function normWords(text) {
  return text.toLowerCase().replace(/[.,!?;:'"()\-]/g, ' ').split(/\s+/).filter(w => w.length > 0);
}

function lcsAlign(tWords, sWords) {
  const m = tWords.length, n = sWords.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = tWords[i-1] === sWords[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const matched = new Set();
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (tWords[i-1] === sWords[j-1]) { matched.add(i-1); i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--; else j--;
  }
  return tWords.map((w, idx) => ({ word: w, correct: matched.has(idx) }));
}

function tokenizePreserve(text) {
  const tokens = [];
  const re = /([a-zA-Z']+)|([^a-zA-Z']+)/g;
  let m;
  while ((m = re.exec(text)) !== null)
    tokens.push(m[1] ? { type: 'word', text: m[1] } : { type: 'punct', text: m[2] });
  return tokens;
}

function showPracticeResult(target, spoken) {
  pState = 'result'; updatePracticeBtn();

  if (!spoken || !spoken.trim()) {
    const ra = document.getElementById('resultArea');
    ra.classList.add('show');
    document.getElementById('resultText').innerHTML = '<span style="opacity:.45">No speech detected. Please try again.</span>';
    document.getElementById('scoreText').textContent = '';
    return;
  }

  const tWords = normWords(target);
  const sWords = normWords(spoken);
  const alignment = lcsAlign(tWords, sWords);
  const correct = alignment.filter(w => w.correct).length;
  const total   = alignment.length;
  const pct     = total ? Math.round(correct / total * 100) : 0;

  const tokens = tokenizePreserve(target);
  let wi = 0;
  const html = tokens.map(tok => {
    if (tok.type === 'word') {
      const ok = wi < alignment.length ? alignment[wi].correct : false;
      wi++;
      return ok ? `<span class="w-ok">${esc(tok.text)}</span>`
                : `<span class="w-err">${esc(tok.text)}</span>`;
    }
    return esc(tok.text);
  }).join('');

  const ra = document.getElementById('resultArea');
  ra.classList.add('show');
  document.getElementById('resultText').innerHTML = html;
  const sc = document.getElementById('scoreText');
  sc.textContent = `${correct} / ${total} words correct  (${pct}%)`;
  sc.style.color = pct >= 80 ? '#4ade80' : pct >= 60 ? '#fbbf24' : '#f87171';
}

// ── Library: Built-in list ───────────────────────────────────────
function renderBuiltinList() {
  const panel = document.getElementById('lpBuiltin');
  panel.innerHTML = '';
  SENTENCES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'sent-item' + (activeSent.source === 'builtin' && activeSent.index === i ? ' active-sent' : '');
    el.dataset.sentIdx = i;
    el.innerHTML = `
      <span class="sent-text">${esc(s.text)}</span>
      <span class="sent-badge badge-${s.level.toLowerCase()}">${s.level}</span>
      <div class="sent-actions">
        <button class="sact sact-save" onclick="saveSentence(${i},'builtin')" title="Save">★</button>
        <button class="sact sact-use"  onclick="useBuiltin(${i})"             title="Use">▶</button>
      </div>`;
    panel.appendChild(el);
  });
}

function useBuiltin(i) {
  loadSentence({ ...SENTENCES[i], source: 'builtin', index: i });
}

// ── Library: Saved ───────────────────────────────────────────────
function renderSavedList() {
  const panel = document.getElementById('lpSaved');
  panel.innerHTML = '';
  if (!savedSentences.length) {
    panel.innerHTML = '<div class="lib-empty">No saved sentences yet.<br>Star any sentence to save it.</div>';
    return;
  }
  savedSentences.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'sent-item';
    el.innerHTML = `
      <span class="sent-text">${esc(s.text)}</span>
      <span class="sent-badge badge-${(s.level||'custom').toLowerCase()}">${s.level || 'Custom'}</span>
      <div class="sent-actions">
        <button class="sact sact-use" onclick="useSaved(${i})"   title="Use">▶</button>
        <button class="sact sact-del" onclick="deleteSaved(${i})" title="Delete">✕</button>
      </div>`;
    panel.appendChild(el);
  });
}

async function saveSentence(i, source, customItem) {
  const item = source === 'builtin' ? SENTENCES[i] : customItem;
  if (!item) return;
  if (savedSentences.find(s => s.text === item.text)) { toast('Already saved!'); return; }
  const entry = { text: item.text, level: item.level || 'Custom', source: 'saved' };
  const fsId = await fsSave(entry);
  savedSentences.push({ ...entry, id: fsId });
  renderSavedList();
  toast('Saved ★');
}

function useSaved(i) {
  loadSentence({ ...savedSentences[i], source: 'saved', index: i });
}

async function deleteSaved(i) {
  const fsId = savedSentences[i]?.id;
  savedSentences.splice(i, 1);
  await fsDelete(fsId);
  renderSavedList();
}

// ── Library: AI Generate ─────────────────────────────────────────
async function generateSentences() {
  const topic = document.getElementById('genTopic').value.trim();
  const diff  = document.getElementById('genDiff').value;
  const count = parseInt(document.getElementById('genCount').value);
  const btn   = document.getElementById('genBtn');
  const resEl = document.getElementById('genResults');

  btn.disabled = true;
  btn.textContent = '⏳ Generating…';
  resEl.innerHTML = '';

  try {
    const res  = await fetch(API_BASE + '/generate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ difficulty: diff, topic, count }),
    });
    const data = await res.json();
    if (data.error) { toast('Error: ' + data.error); return; }

    generatedSents = (data.sentences || []).map(t => ({ text: t, level: diff, source: 'ai' }));
    renderGenResults();
  } catch (e) {
    toast('Connection error.');
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ Generate with AI';
  }
}

function renderGenResults() {
  const el = document.getElementById('genResults');
  el.innerHTML = '';
  if (!generatedSents.length) return;
  generatedSents.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'sent-item';
    div.innerHTML = `
      <span class="sent-text">${esc(s.text)}</span>
      <span class="sent-badge badge-ai">AI</span>
      <div class="sent-actions">
        <button class="sact sact-save" onclick="saveGenerated(${i})" title="Save">★</button>
        <button class="sact sact-use"  onclick="useGenerated(${i})"  title="Use">▶</button>
      </div>`;
    el.appendChild(div);
  });
}

function useGenerated(i) {
  loadSentence({ ...generatedSents[i] });
}

async function saveGenerated(i) {
  await saveSentence(null, 'ai', generatedSents[i]);
}

// ── Library tab switching ────────────────────────────────────────
function switchLibTab(tab) {
  activeLibTab = tab;
  const ids = { builtin: ['ltBuiltin','lpBuiltin'], saved: ['ltSaved','lpSaved'], ai: ['ltAI','lpAI'] };
  Object.entries(ids).forEach(([k,[tabId,panId]]) => {
    document.getElementById(tabId)?.classList.toggle('active', k === tab);
    document.getElementById(panId)?.classList.toggle('active', k === tab);
  });
  if (tab === 'saved') renderSavedList();
}

// ═══════════════════════════════════════════════════════════════════
// SHARED UTILS
// ═══════════════════════════════════════════════════════════════════

function toast(msg) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);'
    + 'background:rgba(0,0,0,.8);color:#fff;padding:9px 18px;border-radius:10px;'
    + 'font-size:13px;z-index:999;pointer-events:none;';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────
// Built-in list and first sentence are rendered immediately.
// Saved sentences are populated after Firestore loads (see Bootstrap above).
renderBuiltinList();
loadSentence({ ...SENTENCES[0], source: 'builtin', index: 0 });
